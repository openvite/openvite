name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: npm-publish
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        working-directory: packages/openvite

      - name: Bump version
        id: version
        working-directory: packages/openvite
        run: |
          LATEST=$(npm view openvite version 2>/dev/null || echo "0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"

          case "${{ inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          # Use jq instead of npm version to avoid workspace: protocol errors
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing openvite@${VERSION} (was ${LATEST})"
          echo "previous=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Publish (OIDC trusted publishing)
        run: |
          # Copy built package to isolated temp dir to avoid workspace: protocol errors
          PUBLISH_DIR="${{ runner.temp }}/publish"
          mkdir -p "$PUBLISH_DIR"
          cp -r packages/openvite/dist "$PUBLISH_DIR/dist"
          # Copy package.json and strip prepack script (it assumes monorepo paths)
          jq 'del(.scripts.prepack)' packages/openvite/package.json > "$PUBLISH_DIR/package.json"
          cp README.md "$PUBLISH_DIR/README.md"
          cp LICENSE "$PUBLISH_DIR/LICENSE"
          cd "$PUBLISH_DIR"
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag release
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

